<div
    x-data="{ open: false }"
    x-show="open"
    x-cloak
    class="fixed inset-0 z-[60] flex items-center justify-center p-4"
    style="display: none;"
>
    <div class="absolute inset-0 bg-slate-950/50" @click="open = false"></div>
    <div class="relative z-10 w-full max-w-2xl overflow-hidden rounded-3xl bg-white shadow-soft">
        <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
            <div>
                {% block modal_header %}
                    <h3 class="text-lg font-semibold text-slate-900">Modal Title</h3>
                {% endblock %}
            </div>
            <button type="button" class="rounded-xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600" @click="open = false">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
        <div class="px-6 py-5 text-sm text-slate-600">
            {% block modal_body %}
                Modal body content goes here.
            {% endblock %}
        </div>
        <div class="flex items-center justify-end gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4">
            {% block modal_footer %}
                <button type="button" class="rounded-2xl border border-slate-200 px-4 py-2 text-sm font-medium text-slate-600 transition hover:bg-white" @click="open = false">Cancel</button>
                <button type="button" class="rounded-2xl bg-brand-700 px-4 py-2 text-sm font-medium text-white transition hover:bg-brand-800">Confirm</button>
            {% endblock %}
        </div>
    </div>
</div>
