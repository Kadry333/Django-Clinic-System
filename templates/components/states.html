<div class="space-y-4">
    <div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-soft">
        <div class="flex items-start gap-4">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-slate-100 text-xs font-semibold text-slate-500">LD</div>
            <div class="min-w-0 flex-1">
                <p class="text-sm font-semibold text-slate-900">Loading state</p>
                <p class="mt-1 text-sm text-slate-500">Use this while data is being fetched.</p>
                <div class="mt-4 space-y-3 animate-pulse">
                    <div class="h-4 w-3/4 rounded bg-slate-200"></div>
                    <div class="h-4 w-full rounded bg-slate-200"></div>
                    <div class="h-4 w-5/6 rounded bg-slate-200"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="rounded-3xl border border-dashed border-slate-300 bg-slate-50 p-5 shadow-soft">
        <div class="flex items-start gap-4">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-white text-xs font-semibold text-slate-500 ring-1 ring-slate-200">EM</div>
            <div>
                <p class="text-sm font-semibold text-slate-900">Empty state</p>
                <p class="mt-1 text-sm text-slate-500">{{ empty_message|default:"No data is available yet for this section." }}</p>
            </div>
        </div>
    </div>
    <div class="rounded-3xl border border-rose-200 bg-rose-50 p-5 shadow-soft">
        <div class="flex items-start gap-4">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-white text-xs font-semibold text-rose-600 ring-1 ring-rose-200">ER</div>
            <div>
                <p class="text-sm font-semibold text-rose-800">Error state</p>
                <p class="mt-1 text-sm text-rose-700">{{ error_message|default:"Something went wrong while loading this section." }}</p>
            </div>
        </div>
    </div>
</div>
