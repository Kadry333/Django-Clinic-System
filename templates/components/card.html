<div class="rounded-3xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-soft">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-sm font-medium text-slate-500">{{ title }}</p>
            <p class="mt-3 text-3xl font-semibold tracking-tight text-slate-900">{{ value }}</p>
        </div>
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-brand-50 text-brand-700">
            {{ icon|default:"--" }}
        </div>
    </div>
</div>
