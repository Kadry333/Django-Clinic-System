<div x-cloak x-show="open" class="fixed inset-0 z-[60] flex items-center justify-center p-4" style="display:none;">
    <div class="absolute inset-0 bg-slate-950/50" @click="open = false"></div>
    <div class="relative z-10 w-full max-w-2xl overflow-hidden rounded-panel bg-white shadow-panel">
        <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
            <div>
                <h3 class="text-lg font-semibold text-slate-900">{{ modal_title|default:"Reschedule Appointment" }}</h3>
                <p class="mt-1 text-sm text-slate-500">Compare old and new appointment details before confirming.</p>
            </div>
            <button type="button" class="rounded-2xl p-2 text-slate-400 transition hover:bg-slate-100 hover:text-slate-600" @click="open = false">?</button>
        </div>
        <div class="space-y-5 px-6 py-5">
            <div class="grid gap-4 md:grid-cols-2">
                <div class="rounded-2xl border border-slate-200 bg-slate-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-400">Old date</p>
                    <p class="mt-2 text-sm font-semibold text-slate-900">14 May 2026, 11:00 AM</p>
                    <p class="mt-1 text-sm text-slate-500">Dr. Omar Hassan</p>
                </div>
                <div class="rounded-2xl border border-teal-200 bg-teal-50 p-4">
                    <p class="text-xs font-semibold uppercase tracking-[0.2em] text-teal-700">New date</p>
                    <p class="mt-2 text-sm font-semibold text-slate-900">16 May 2026, 01:30 PM</p>
                    <p class="mt-1 text-sm text-slate-500">Dr. Omar Hassan</p>
                </div>
            </div>
            <div>
                <label class="mb-2 block text-sm font-medium text-slate-700">Reason</label>
                <textarea rows="4" class="w-full rounded-2xl border border-slate-200 px-4 py-3 text-sm outline-none transition focus:border-primary focus:ring-4 focus:ring-teal-50" placeholder="Add a reason for the reschedule request"></textarea>
                <p class="mt-2 text-sm text-rose-600">Validation UI: Reason is required.</p>
            </div>
            <div class="rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-700">Success feedback: Request prepared successfully.</div>
        </div>
        <div class="flex items-center justify-end gap-3 border-t border-slate-200 bg-slate-50 px-6 py-4">
            <button type="button" class="rounded-2xl border border-slate-200 px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-white" @click="open = false">Cancel</button>
            <button type="button" class="rounded-2xl bg-primary px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-800 disabled:cursor-not-allowed disabled:opacity-50" disabled>Submit Disabled</button>
            <button type="button" class="rounded-2xl bg-primary px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-teal-800">Confirm Reschedule</button>
        </div>
    </div>
</div>
