<div class="rounded-panel border border-slate-200 bg-white p-5 shadow-soft">
    <div class="flex items-start justify-between gap-4">
        <div>
            <p class="text-sm font-medium text-slate-500">{{ title|default:"Card Title" }}</p>
            <p class="mt-3 text-3xl font-semibold tracking-tight text-slate-900">{{ value|default:"128" }}</p>
            {% if subtitle %}<p class="mt-2 text-sm text-slate-500">{{ subtitle }}</p>{% endif %}
        </div>
        <div class="flex h-12 w-12 items-center justify-center rounded-2xl bg-teal-50 text-sm font-semibold text-primary">{{ icon|default:"UI" }}</div>
    </div>
</div>
